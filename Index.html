<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Geeta 💞</title>
<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #ffd1e6, #ffeef7);
    font-family: Arial, sans-serif;
    overflow: hidden; /* Screen scroll na ho */
}

.container {
    text-align: center;
    position: relative;
}

.title {
    font-size: 28px;
    color: #ff4d88;
    margin-bottom: 50px; /* Thoda gap badhaya */
}

.envelope {
    position: relative;
    width: 280px;
    height: 180px;
    background: #ff8fb1;
    border-radius: 0 0 10px 10px;
    cursor: pointer;
    margin: auto;
    /* overflow: hidden;  <-- Is line ko hata diya taaki letter bahar dikhe */
}

.flap {
    position: absolute;
    top: 0;
    left: 0;
    width: 0;
    height: 0;
    border-left: 140px solid transparent;
    border-right: 140px solid transparent;
    border-top: 90px solid #ff6fa1;
    transform-origin: top;
    transition: 0.6s;
    z-index: 3; /* Flap sabse upar rahe */
}

.letter {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    width: 80%;
    max-height: 200px; /* Letter ki maximum height */
    background: white;
    padding: 20px;
    border-radius: 10px;
    top: 5px;
    opacity: 0;
    transition: 0.8s;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    font-size: 15px;
    line-height: 1.6;
    color: #444;
    overflow-y: auto; /* Scrolling enable kar di */
    z-index: 2;
}

/* Jab envelope khule tab ki settings */
.open .flap {
    transform: rotateX(180deg);
    z-index: 1; /* Khulne ke baad flap piche chala jaye */
}

.open .letter {
    top: -140px; /* Letter ko thoda aur upar shift kiya */
    opacity: 1;
}
</style>
</head>
<body>

<div class="container">
    <div class="title">For Geeta 💞</div>
    <div class="envelope" onclick="openEnvelope()" id="env">
        <div class="flap"></div>
        <div class="letter">
            <strong>Sonaaaa 👉👈</strong><br><br>
            Suno na I'm so sorry. <br>
            Shayad main apni baat samjha nahi paya aur bas aapke ek chhote se word se trigger ho gaya. 🥲<br><br>
            Shayad mujhe itna gussa nahi karna chahiye tha. <br>
            Sorry... 🤌🌷<br><br>
            I love you so much. 🫶💕<br><br>
            And good morning 🌷💕
        </div>
    </div>
</div>

<script>
function openEnvelope(){
    document.getElementById("env").classList.toggle("open");
}
</script>

</body>
</html>
