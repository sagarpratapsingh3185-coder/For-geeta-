<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Geeta 💞</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ffd1e6,#ffeef7);
font-family: Arial, sans-serif;
}

.container{
text-align:center;
}

.title{
font-size:28px;
color:#ff4d88;
margin-bottom:20px;
}

.envelope{
position:relative;
width:260px;
height:160px;
background:#ff8fb1;
border-radius:10px;
cursor:pointer;
margin:auto;
overflow:hidden;
}

.flap{
position:absolute;
top:0;
left:0;
width:0;
height:0;
border-left:130px solid transparent;
border-right:130px solid transparent;
border-top:80px solid #ff6fa1;
transform-origin:top;
transition:0.6s;
}

.letter{
position:absolute;
left:50%;
transform:translateX(-50%);
width:85%;
background:white;
padding:15px;
border-radius:10px;
top:60px;
opacity:0;
transition:0.6s;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
font-size:14px;
line-height:1.5;
}

.open .flap{
transform:rotateX(180deg);
}

.open .letter{
top:-120px;
opacity:1;
}

</style>

</head>

<body>

<div class="container">

<div class="title">For Geeta 💞</div>

<div class="envelope" onclick="openEnvelope()" id="env">

<div class="flap"></div>

<div class="letter">

Sonaaaa 👉👈<br><br>

Suno na I'm so sorry.  
Shayad main apni baat samjha nahi paya aur bas aapke ek chhote se word se trigger ho gaya. 🥲<br><br>

Shayad mujhe itna gussa nahi karna chahiye tha.  
Sorry... 🤌🌷<br><br>

I love you so much. 🫶💕<br><br>

And good morning 🌷💕

</div>

</div>

</div>

<script>

function openEnvelope(){
document.getElementById("env").classList.toggle("open");
}

</script>

</body>

</html>
